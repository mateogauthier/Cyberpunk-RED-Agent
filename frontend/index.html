<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGENT // SAAI INTERFACE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="app">
    <header>
      <div class="header-left">
        <span class="logo-diamond">◈</span>
        <span class="logo-title">A G E N T</span>
      </div>
      <div class="header-meta">
        <span class="saai-tag">SAAI v4.1</span>
        <div class="status-indicator">
          <span class="status-dot"></span>
          <span>ONLINE</span>
        </div>
      </div>
    </header>

    <div class="deck-bar">
      <div class="deck-track">
        <span>DATA POOL</span>
        <span class="bar-sep">◈</span>
        <span>ZIGGURAT CITINET</span>
        <span class="bar-sep">◈</span>
        <span>THE GARDEN</span>
        <span class="bar-sep">◈</span>
        <span>SECURE CHANNEL</span>
        <span class="bar-sep">◈</span>
        <span>DATA POOL</span>
        <span class="bar-sep">◈</span>
        <span>ZIGGURAT CITINET</span>
        <span class="bar-sep">◈</span>
        <span>THE GARDEN</span>
        <span class="bar-sep">◈</span>
        <span>SECURE CHANNEL</span>
        <span class="bar-sep">◈</span>
      </div>
    </div>

    <div id="messages">
      <div id="typing">
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <div class="input-wrapper">
      <div class="input-row">
        <span class="prompt-sym">▶</span>
        <input
          id="user-input"
          type="text"
          placeholder="TRANSMIT TO AGENT..."
          autocomplete="off"
          disabled
        />
        <button id="send-btn" disabled>SEND</button>
      </div>
      <div class="input-hint">[ ENTER ] TO TRANSMIT</div>
    </div>
  </div>

  <script src="/main.js"></script>
</body>
</html>
