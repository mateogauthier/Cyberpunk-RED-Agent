<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGENT // SAAI INTERFACE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <div class="header-left">
        <span class="logo-diamond">◈</span>
        <span class="logo-title">A G E N T</span>
      </div>
      <div class="header-meta">
        <span class="saai-tag">SAAI v4.1</span>
        <div class="status-indicator">
          <span class="status-dot"></span>
          <span>ONLINE</span>
        </div>
      </div>
    </header>

    <div class="deck-bar">
      <div class="deck-track" id="deck-track">
        <button class="tab-btn active" data-tab="chat">COMM LINK</button>
        <span class="bar-sep">◈</span>
        <button class="tab-btn" data-tab="news">SCREAMSHEETS</button>
        <span class="bar-sep">◈</span>
        <button class="tab-btn" data-tab="market">NIGHT MARKETS</button>
        <span class="bar-sep">◈</span>
        <button class="tab-btn" data-tab="gigs">GIG BOARD</button>
        <span class="bar-sep">◈</span>
        <button class="tab-btn" data-tab="profile">EDGERUNNER FILE</button>
        <span class="bar-sep">◈</span>
        <button class="tab-btn active" data-tab="chat">COMM LINK</button>
        <span class="bar-sep">◈</span>
        <button class="tab-btn" data-tab="news">SCREAMSHEETS</button>
        <span class="bar-sep">◈</span>
        <button class="tab-btn" data-tab="market">NIGHT MARKETS</button>
        <span class="bar-sep">◈</span>
        <button class="tab-btn" data-tab="gigs">GIG BOARD</button>
        <span class="bar-sep">◈</span>
        <button class="tab-btn" data-tab="profile">EDGERUNNER FILE</button>
        <span class="bar-sep">◈</span>
      </div>
    </div>

    <!-- ── CHAT ── -->
    <div id="panel-chat" class="tab-panel active">
      <div id="messages">
        <div id="typing">
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>
      <div class="input-wrapper">
        <div class="input-row">
          <span class="prompt-sym">▶</span>
          <input
            id="user-input"
            type="text"
            placeholder="TRANSMIT TO AGENT..."
            autocomplete="off"
            disabled
          />
          <button id="send-btn" disabled>SEND</button>
        </div>
        <div class="input-hint">[ ENTER ] TO TRANSMIT</div>
      </div>
    </div>

    <!-- ── NEWS ── -->
    <div id="panel-news" class="tab-panel">
      <div class="news-toolbar">
        <button id="generate-news-btn" class="news-gen-btn">◈ UPDATE FEED</button>
        <span class="news-status" id="news-status"></span>
      </div>
      <div id="news-feed" class="news-feed">
        <div class="news-empty-state">// NO ACTIVE FEED — JACK IN TO RETRIEVE //</div>
      </div>
    </div>

    <!-- ── NIGHT MARKETS ── -->
    <div id="panel-market" class="tab-panel">
      <div class="market-toolbar">
        <button id="scout-market-btn" class="market-gen-btn">◈ SCOUT MARKETS</button>
        <span class="market-status" id="market-status"></span>
      </div>
      <div id="market-feed" class="market-feed">
        <div class="market-empty-state">// NO ACTIVE LISTINGS — CONTACT YOUR FIXER //</div>
      </div>
    </div>

    <!-- ── GIG BOARD ── -->
    <div id="panel-gigs" class="tab-panel">
      <div class="gig-toolbar">
        <button id="pull-gigs-btn" class="gig-gen-btn">◈ PULL BOARD</button>
        <span class="gig-status" id="gig-status"></span>
      </div>
      <div id="gig-feed" class="gig-feed">
        <div class="gig-empty-state">// NO ACTIVE POSTINGS — CHECK YOUR FIXER CONTACTS //</div>
      </div>
    </div>

    <!-- ── PROFILE ── -->
    <div id="panel-profile" class="tab-panel">
      <div class="profile-container">
        <div class="profile-header">◈ EDGERUNNER FILE ◈</div>
        <form id="profile-form" class="profile-form">
          <div class="profile-layout">

            <div class="profile-avatar-area">
              <div class="profile-avatar" id="profile-avatar" role="button" tabindex="0" aria-label="Set avatar image">
                <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg" class="silhouette-svg" aria-hidden="true">
                  <ellipse cx="50" cy="30" rx="20" ry="22"/>
                  <path d="M10 120 Q10 80 30 72 Q40 68 50 68 Q60 68 70 72 Q90 80 90 120Z"/>
                </svg>
              </div>
              <div class="avatar-label" id="avatar-label">[ CLICK TO SET IMAGE ]</div>
            </div>

            <div class="profile-fields">
              <div class="profile-field">
                <label class="profile-label" for="profile-handle">HANDLE</label>
                <div class="input-row">
                  <span class="prompt-sym">▶</span>
                  <input type="text" id="profile-handle" class="profile-input"
                         placeholder="YOUR STREET NAME..." autocomplete="off" />
                </div>
              </div>
              <div class="profile-field">
                <label class="profile-label" for="profile-role">PROFESSION</label>
                <div class="input-row">
                  <span class="prompt-sym">▶</span>
                  <select id="profile-role" class="profile-input profile-select">
                    <option value="">SELECT ROLE...</option>
                    <option value="Rockerboy">ROCKERBOY</option>
                    <option value="Solo">SOLO</option>
                    <option value="Netrunner">NETRUNNER</option>
                    <option value="Tech">TECH</option>
                    <option value="Medtech">MEDTECH</option>
                    <option value="Media">MEDIA</option>
                    <option value="Exec">EXEC</option>
                    <option value="Lawman">LAWMAN</option>
                    <option value="Fixer">FIXER</option>
                    <option value="Nomad">NOMAD</option>
                  </select>
                </div>
              </div>
              <div class="profile-field profile-field--bio">
                <label class="profile-label" for="profile-bio">BIO</label>
                <div class="input-row input-row--textarea">
                  <span class="prompt-sym">▶</span>
                  <textarea id="profile-bio" class="profile-input profile-textarea"
                            placeholder="YOUR STORY. WHERE YOU CAME FROM, WHAT YOU WANT, WHAT YOU'VE DONE..."
                            rows="6"></textarea>
                </div>
              </div>
            </div>

          </div>
          <button type="submit" id="profile-save-btn" class="profile-save-btn">
            ◈ COMMIT TO RECORD ◈
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
